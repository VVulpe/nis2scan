name: Integration Tests (Azure)

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: integration-azure-${{ github.ref }}
  cancel-in-progress: true

env:
  TF_VAR_run_id: ${{ github.run_id }}

jobs:
  integration:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: integration-test-azure
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7"
          terraform_wrapper: false

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Terraform Init
        working-directory: infra/azure
        run: terraform init

      - name: Terraform Apply
        working-directory: infra/azure
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: true
        run: terraform apply -auto-approve

      - name: Export Terraform Outputs
        working-directory: infra/azure
        run: terraform output -json > ../../tests/integration/az_tf_outputs.json

      - name: Run Azure Integration Tests
        env:
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
        run: pytest tests/integration/test_integration_az_*.py -v --tb=short -m integration -n auto

      # === Cleanup Phase (always runs, even on failure) ===

      - name: Azure Login (OIDC) — for destroy
        if: always()
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform Init (for destroy)
        if: always()
        working-directory: infra/azure
        run: terraform init

      - name: Terraform Destroy
        id: destroy
        if: always()
        working-directory: infra/azure
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: true
        run: terraform destroy -auto-approve
        continue-on-error: true

      - name: Nuke Resource Groups (safety net — always runs)
        if: always()
        run: |
          az group list --tag Project=nis2scan --query "[].name" -o tsv | while read rg; do
            echo "Deleting resource group: $rg"
            az group delete --name "$rg" --yes --no-wait
          done

      - name: Post-Destroy Verification
        if: always()
        run: python infra/azure/scripts/post_destroy_verify.py
