name: Integration Tests (GCP)

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: integration-gcp-${{ github.ref }}
  cancel-in-progress: true

env:
  TF_VAR_project_id: ${{ secrets.GCP_PROJECT_ID }}
  TF_VAR_run_id: ${{ github.run_id }}

jobs:
  integration:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: GCP Auth (OIDC)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7"
          terraform_wrapper: false

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Terraform Init
        working-directory: infra/gcp
        run: terraform init

      - name: Terraform Apply
        working-directory: infra/gcp
        run: terraform apply -auto-approve

      - name: Export Terraform Outputs
        working-directory: infra/gcp
        run: terraform output -json > ../../tests/integration/gcp_tf_outputs.json

      - name: Run GCP Integration Tests
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
        run: pytest tests/integration/test_integration_gcp_*.py -v --tb=short -m integration -n auto

      # === Cleanup Phase (always runs) ===

      - name: GCP Auth (OIDC) — for destroy
        if: always()
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Terraform Init (for destroy)
        if: always()
        working-directory: infra/gcp
        run: terraform init

      - name: Terraform Destroy
        id: destroy
        if: always()
        working-directory: infra/gcp
        run: terraform destroy -auto-approve
        continue-on-error: true

      - name: Nuke Remaining Resources (safety net — always runs)
        if: always()
        run: |
          set +e  # don't abort on individual failures
          echo "=== Deleting GCS buckets ==="
          for bucket in $(gcloud storage ls 2>/dev/null | grep nis2); do
            echo "Deleting bucket: $bucket"
            gcloud storage rm -r "$bucket" --quiet 2>/dev/null || true
          done

          echo "=== Deleting firewall rules ==="
          for rule in $(gcloud compute firewall-rules list --filter="name~nis2" --format="value(name)" 2>/dev/null); do
            echo "Deleting firewall rule: $rule"
            gcloud compute firewall-rules delete "$rule" --quiet 2>/dev/null || true
          done

          echo "=== Deleting VPC networks ==="
          for net in $(gcloud compute networks list --filter="name~nis2" --format="value(name)" 2>/dev/null); do
            echo "Deleting network: $net"
            gcloud compute networks delete "$net" --quiet 2>/dev/null || true
          done

          echo "=== Scheduling KMS key destruction ==="
          for key in $(gcloud kms keys list --location=europe-west1 --keyring=nis2-nr8-* --format="value(name)" 2>/dev/null); do
            echo "Scheduling destruction: $key"
            for ver in $(gcloud kms keys versions list --key="$key" --format="value(name)" --filter="state!=DESTROYED AND state!=DESTROY_SCHEDULED" 2>/dev/null); do
              gcloud kms keys versions destroy "$ver" --quiet 2>/dev/null || true
            done
          done

          echo "=== Nuke complete ==="

      - name: Wait for GCP propagation
        if: always()
        run: echo "Waiting 30s for Cloud Asset Inventory propagation..." && sleep 30

      - name: Post-Destroy Verification
        if: always()
        run: python infra/gcp/scripts/post_destroy_verify.py
