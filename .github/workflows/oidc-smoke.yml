# Quick health check for the three cloud OIDC trusts (AWS, Azure, GCP).
# Authenticates via GitHub OIDC and runs one read-only identity call per
# provider — no infrastructure is created. Use after changes to the OIDC
# setup (infra/*/oidc) or the repository owner/name.
name: OIDC Smoke Test

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  aws:
    runs-on: ubuntu-latest
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_CI_ROLE_ARN }}
          aws-region: eu-central-1
      - name: Verify identity
        run: aws sts get-caller-identity --query Arn --output text

  azure:
    runs-on: ubuntu-latest
    # Must match the federated credential subject (infra/azure/oidc/main.tf)
    environment: integration-test-azure
    steps:
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Verify identity
        run: az account show --query name --output tsv

  gcp:
    runs-on: ubuntu-latest
    steps:
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          token_format: access_token
      - name: Verify identity
        run: echo "Token exchange and service account impersonation succeeded."
