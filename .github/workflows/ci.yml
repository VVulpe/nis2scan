name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[dev]"
      - name: Ruff check
        run: ruff check nis2scan/ tests/
      - name: Ruff format check
        run: ruff format --check nis2scan/ tests/
      - name: Type check
        run: mypy nis2scan/
      - name: Unit tests
        # Coverage is reported (term-missing) but not gated yet (Audit TEST-3) —
        # a --cov-fail-under gate follows once the known coverage gaps are closed.
        run: pytest tests/ -m "not integration" -v --tb=short -n auto --cov=nis2scan --cov-report=term-missing

  cli-smoke:
    name: CLI package smoke test
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Build sdist and wheel
        run: |
          pip install build
          python -m build
      - name: Install the wheel into a fresh venv
        # Deliberately NOT an editable install (pip install -e .) — the unit
        # test suite already runs against the editable checkout and would not
        # catch packaging bugs (missing package data, entry points, etc.).
        # This installs the actual built artifact, like a real user would
        # (Audit TEST-P0-Lehre).
        run: |
          python -m venv smoke-venv
          smoke-venv/bin/pip install --upgrade pip
          smoke-venv/bin/pip install dist/*.whl
      - name: nis2scan --version reports the package version
        run: |
          EXPECTED_VERSION=$(smoke-venv/bin/python -c "from nis2scan import __version__; print(__version__)")
          OUTPUT=$(smoke-venv/bin/nis2scan --version)
          echo "$OUTPUT"
          echo "$OUTPUT" | grep -qF "$EXPECTED_VERSION"
      - name: nis2scan --help exits 0
        run: smoke-venv/bin/nis2scan --help
      - name: nis2scan permissions --provider aws --format list exits 0 and lists IAM permissions
        run: |
          OUTPUT=$(smoke-venv/bin/nis2scan permissions --provider aws --format list)
          echo "$OUTPUT"
          echo "$OUTPUT" | grep -q "iam:"
      - name: nis2scan scan --provider falsch exits 1 with a German error
        run: |
          set +e
          OUTPUT=$(smoke-venv/bin/nis2scan scan --provider falsch 2>&1)
          EXIT_CODE=$?
          set -e
          echo "$OUTPUT"
          if [ "$EXIT_CODE" -ne 1 ]; then
            echo "Expected exit code 1 for an unknown --provider, got $EXIT_CODE"
            exit 1
          fi
          echo "$OUTPUT" | grep -q "Unbekannter Provider"
      - name: nis2scan permissions --provider falsch exits 1
        run: |
          set +e
          smoke-venv/bin/nis2scan permissions --provider falsch
          EXIT_CODE=$?
          set -e
          if [ "$EXIT_CODE" -ne 1 ]; then
            echo "Expected exit code 1 for an unknown --provider, got $EXIT_CODE"
            exit 1
          fi
