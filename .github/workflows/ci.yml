name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[dev]"
      - name: Ruff check
        run: ruff check nis2scan/ tests/
      - name: Ruff format check
        run: ruff format --check nis2scan/ tests/
      - name: Type check
        run: mypy nis2scan/
      - name: Unit tests
        run: pytest tests/ -m "not integration" -v --tb=short -n auto
